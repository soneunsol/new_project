name: Deploy to GitHub Pages

# main 브랜치에 push 될 때마다 정적 사이트를 GitHub Pages 로 배포합니다.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 진행 (중복 실행 취소)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 빌드 과정이 없는 순수 정적 사이트이므로 루트 전체를 업로드
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
